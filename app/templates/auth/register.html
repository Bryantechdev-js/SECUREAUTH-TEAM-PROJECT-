{% extends "base.html" %}
{% block title %}Create Account — SecureAuth{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card">

    <div class="auth-logo">
      <i class="fa-solid fa-user-plus" style="color:#fff;"></i>
    </div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join SecureAuth — it only takes a minute</p>

    <form method="POST" action="{{ url_for('auth.register') }}" novalidate>

      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" name="username" class="form-control"
                 placeholder="johndoe" required autofocus>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control"
                 placeholder="you@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" name="password" id="reg-password" class="form-control"
                 placeholder="Min. 8 characters" required oninput="checkStrength(this.value)">
          <button type="button" class="toggle-password" onclick="togglePwd('reg-password','eyeReg')">
            <i class="fa-solid fa-eye" id="eyeReg"></i>
          </button>
        </div>
        <div class="strength-bar" id="strengthBar">
          <div class="strength-segment" id="s1"></div>
          <div class="strength-segment" id="s2"></div>
          <div class="strength-segment" id="s3"></div>
          <div class="strength-segment" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel">Enter a password</div>
      </div>

      <button type="submit" class="btn btn-primary btn-w mt-2">
        <i class="fa-solid fa-rocket"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePwd(id, iconId) {
  const input = document.getElementById(id);
  const icon  = document.getElementById(iconId);
  input.type  = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
}

function checkStrength(val) {
  const segs   = [document.getElementById('s1'), document.getElementById('s2'),
                  document.getElementById('s3'), document.getElementById('s4')];
  const label  = document.getElementById('strengthLabel');
  const colors = ['#ef4444','#f59e0b','#3b82f6','#10b981'];
  const labels = ['Too short','Weak','Good','Strong'];

  let score = 0;
  if (val.length >= 8)  score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  segs.forEach((s, i) => {
    s.style.background = i < score ? colors[score - 1] : 'var(--border)';
  });
  label.textContent  = val.length === 0 ? 'Enter a password' : labels[score - 1] || 'Too short';
  label.style.color  = val.length === 0 ? 'var(--text-muted)' : colors[score - 1] || '#ef4444';
}
</script>
{% endblock %}
